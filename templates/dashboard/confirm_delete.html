{% extends "dashboard/dashboard_base.html" %}
{% block title %}{{ title }}{% endblock %}

{% block dash_content %}

<div class="max-w-lg mx-auto mt-10">
  <div class="glass rounded-sm p-10 text-center">
    <div class="w-16 h-16 rounded-full border border-red-400/40 flex items-center justify-center mx-auto mb-6 text-red-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
    </div>
    <h1 class="font-heading text-2xl text-white mb-3">{{ title }}</h1>
    <p class="text-gray-400 text-sm mb-8">This action cannot be undone. Are you sure you want to permanently delete this item?</p>
    <form method="post" class="flex gap-4 justify-center">
      {% csrf_token %}
      <button type="submit" class="inline-flex items-center justify-center px-8 py-3 bg-red-500 hover:bg-red-600 text-white text-sm font-semibold uppercase tracking-widest rounded-sm transition-colors">Yes, Delete</button>
      <a href="{% url cancel_url %}" class="btn-outline-gold">Cancel</a>
    </form>
  </div>
</div>

{% endblock %}
